# 2. S3 Backup Job
# Sends data to your unlimited AWS S3 bucket and retains up to the maximum limit.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-s3-yearly
  namespace: longhorn-system
spec:
  task: "backup"
  cron: "0 2 * * *"      # Runs daily at 2:00 AM (after local snapshot)
  retain: 100            # Keeps 100 backups in S3 (maximum allowed by Longhorn webhook)
  concurrency: 1         # Processes 1 volume at a time to minimize CPU/IOPS