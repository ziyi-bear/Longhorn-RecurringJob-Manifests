# 2. S3 Backup Job
# Sends data to your unlimited AWS S3 bucket and retains it for a year.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-s3-yearly
  namespace: longhorn-system
spec:
  task: "backup"
  cron: "0 2 * * *"      # Runs daily at 2:00 AM (after local snapshot)
  retain: 365            # Keeps 365 days of backups in S3 (1 year)
  concurrency: 1         # Processes 1 volume at a time to minimize CPU/IOPS